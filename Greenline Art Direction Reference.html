document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-radius:4px;background:#b7c5d0;border:1px solid rgba(255,255,255,.14)\"><\u002Fdiv><span style=\"font:600 10.5px ui-monospace,Menlo,monospace;color:#c3cbd1\">#b7c5d0<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:7px\"><div style=\"width:16px;height:16px;border-radius:4px;background:#eef4f8;border:1px solid rgba(255,255,255,.14)\"><\u002Fdiv><span style=\"font:600 10.5px ui-monospace,Menlo,monospace;color:#c3cbd1\">#eef4f8<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:7px\"><div style=\"width:16px;height:16px;border-radius:4px;background:#6b7b88;border:1px solid rgba(255,255,255,.14)\"><\u002Fdiv><span style=\"font:600 10.5px ui-monospace,Menlo,monospace;color:#c3cbd1\">#6b7b88<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:7px\"><div style=\"width:16px;height:16px;border-radius:4px;background:#3f4b55;border:1px solid rgba(255,255,255,.14)\"><\u002Fdiv><span style=\"font:600 10.5px ui-monospace,Menlo,monospace;color:#c3cbd1\">#3f4b55<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <div style=\"font:400 13.5px/1.55 'Saira Condensed',sans-serif;color:#aab3ba\">Sharp dark band pinned to <b style=\"color:#dde3e8\">51%<\u002Fb> reads as the horizon reflection line — the single detail that makes flat gradients look like brushed chrome. Skew the whole wordmark <b style=\"color:#dde3e8\">-7°<\u002Fb> and clip this gradient to the text.<\u002Fdiv>\n\n<\u002Fdiv>\n  <div style=\"background:#14171b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px 24px 26px;display:flex;flex-direction:column;gap:16px\">\n  <div style=\"display:flex;flex-direction:column;gap:3px\">\n    <div style=\"font:600 11px/1 'Saira Condensed',sans-serif;letter-spacing:.28em;color:#2ae57e\">MATERIAL<\u002Fdiv>\n    <div style=\"font:600 21px/1.05 'Saira Condensed',sans-serif;color:#eef2f5;letter-spacing:.01em\">RGB Split &amp; Glow<\u002Fdiv>\n  <\u002Fdiv>\n  \n  <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:13px\"><div style=\"display:flex;flex-direction:column;gap:6px\">\n  <div style=\"height:44px;border-radius:7px;background:#ff4646;border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)\"><\u002Fdiv>\n  <div style=\"font:600 11px/1.1 ui-monospace,Menlo,monospace;color:#d3dae0\">#ff4646<\u002Fdiv>\n  <div style=\"font:400 11px/1.15 'Saira Condensed',sans-serif;color:#8a939b;letter-spacing:.02em\">Red ghost (+4px, screen)<\u002Fdiv>\n<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:6px\">\n  <div style=\"height:44px;border-radius:7px;background:#3cffbe;border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)\"><\u002Fdiv>\n  <div style=\"font:600 11px/1.1 ui-monospace,Menlo,monospace;color:#d3dae0\">#3cffbe<\u002Fdiv>\n  <div style=\"font:400 11px/1.15 'Saira Condensed',sans-serif;color:#8a939b;letter-spacing:.02em\">Green ghost (-4px, screen)<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n  <div style=\"font:400 13.5px/1.55 'Saira Condensed',sans-serif;color:#aab3ba\">Two blurred, offset duplicates of the wordmark behind the chrome fill, both at ~30% alpha with <b style=\"color:#dde3e8\">mix-blend:screen<\u002Fb>. Sells speed + a broadcast-signal edge without touching the readable face.<\u002Fdiv>\n\n<\u002Fdiv>\n  <div style=\"background:#14171b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px 24px 26px;display:flex;flex-direction:column;gap:16px\">\n  <div style=\"display:flex;flex-direction:column;gap:3px\">\n    <div style=\"font:600 11px/1 'Saira Condensed',sans-serif;letter-spacing:.28em;color:#2ae57e\">TYPE<\u002Fdiv>\n    <div style=\"font:600 21px/1.05 'Saira Condensed',sans-serif;color:#eef2f5;letter-spacing:.01em\">Typography System<\u002Fdiv>\n  <\u002Fdiv>\n  \n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:16px 18px;background:#0d1013;display:flex;flex-direction:column;gap:14px\">\n    <div style=\"font:64px/0.9 'Archivo Black',sans-serif;transform:skewX(-7deg);background:linear-gradient(179deg,#f7fbfe 4%,#cfdae2 26%,#93a3b0 44%,#39454f 51%,#b7c5d0 57%,#eef4f8 72%,#6b7b88 88%,#3f4b55 100%);-webkit-background-clip:text;background-clip:text;color:transparent\">GREENLINE<\u002Fdiv>\n    <div style=\"font:italic 600 20px 'Saira Condensed',sans-serif;letter-spacing:.1em;color:#cfe0ea\">GRN·07 &nbsp; KSK·13<\u002Fdiv>\n    <div style=\"font:600 15px 'Saira Condensed',sans-serif;letter-spacing:.5em;color:#b7c6d1\">ENGINEERED TO COLLIDE.<\u002Fdiv>\n  <\u002Fdiv>\n  <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px\"><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Archivo Black<\u002Fb> — wordmark only. Skew -7°, chrome gradient fill, letter-spacing -0.015em.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Saira Condensed<\u002Fb> — decals, machine codes (italic 600), taglines. Uppercase, .1–.5em tracking.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Saira Extra Condensed<\u002Fb> — fine print, credits, spec rows.<\u002Fspan><\u002Fli><\u002Ful>\n\n<\u002Fdiv>\n  <div style=\"background:#14171b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px 24px 26px;display:flex;flex-direction:column;gap:16px\">\n  <div style=\"display:flex;flex-direction:column;gap:3px\">\n    <div style=\"font:600 11px/1 'Saira Condensed',sans-serif;letter-spacing:.28em;color:#2ae57e\">CRAFT<\u002Fdiv>\n    <div style=\"font:600 21px/1.05 'Saira Condensed',sans-serif;color:#eef2f5;letter-spacing:.01em\">Lighting &amp; Atmosphere<\u002Fdiv>\n  <\u002Fdiv>\n  <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px\"><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>One dominant <b style=\"color:#dde3e8\">cool-white key<\u002Fb> from the floodlight rig — everything else falls to blue-black night.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Warm <b style=\"color:#ffb02e\">amber<\u002Fb> is <i>motivated only<\u002Fi> by the collision — never ambient. It is the energy, not the palette.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#2ae57e\">Green<\u002Fb> is the sole saturated brand colour. Reserve it for the signature line + machine underglow. Nothing else gets green.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Every glow uses <b style=\"color:#dde3e8\">mix-blend:screen<\u002Fb>; sit the whole frame under a heavy radial vignette + film grain.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Depth in three planes: hazy blue distance → sharp chrome mid → near-black dust framing the edges.<\u002Fspan><\u002Fli><\u002Ful>\n<\u002Fdiv>\n  <div style=\"background:#14171b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px 24px 26px;display:flex;flex-direction:column;gap:16px\">\n  <div style=\"display:flex;flex-direction:column;gap:3px\">\n    <div style=\"font:600 11px/1 'Saira Condensed',sans-serif;letter-spacing:.28em;color:#2ae57e\">CRAFT<\u002Fdiv>\n    <div style=\"font:600 21px/1.05 'Saira Condensed',sans-serif;color:#eef2f5;letter-spacing:.01em\">Chrome Gradient Recipe<\u002Fdiv>\n  <\u002Fdiv>\n  \n  <div style=\"border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:14px 16px;background:#0d1013;font:500 11.5px/1.7 ui-monospace,Menlo,monospace;color:#9fe6c3;overflow-wrap:anywhere\">linear-gradient(179deg,<wbr>#f7fbfe 4%,<wbr>#cfdae2 26%,<wbr>#93a3b0 44%,<wbr>#39454f 51%,<wbr>#b7c5d0 57%,<wbr>#eef4f8 72%,<wbr>#6b7b88 88%,<wbr>#3f4b55 100%)<\u002Fdiv>\n  <div style=\"font:400 13.5px/1.55 'Saira Condensed',sans-serif;color:#aab3ba\">Same gradient drives the wordmark <i>and<\u002Fi> the machine bodywork. Vary the angle (100–262°) per machine so panels catch light from different sides; drop a 2px white specular streak where the canopy edge would be.<\u002Fdiv>\n\n<\u002Fdiv>\n  <div style=\"background:#14171b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px 24px 26px;display:flex;flex-direction:column;gap:16px\">\n  <div style=\"display:flex;flex-direction:column;gap:3px\">\n    <div style=\"font:600 11px/1 'Saira Condensed',sans-serif;letter-spacing:.28em;color:#2ae57e\">CRAFT<\u002Fdiv>\n    <div style=\"font:600 21px/1.05 'Saira Condensed',sans-serif;color:#eef2f5;letter-spacing:.01em\">FX Signature<\u002Fdiv>\n  <\u002Fdiv>\n  <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px\"><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Spark shower<\u002Fb> — radial lines from a single collision origin: white-hot core → #ffd9a0 → #ffb02e → #ff9b2e, thinning outward. Add loose dot embers.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Impact flash<\u002Fb> — layered radial (white→amber→transparent) + one horizontal + one vertical light lance, all screen-blend.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Green signature line<\u002Fb> — a hairline #2ae57e→#eafff3→#2ae57e streak under the wordmark with a soft bloom bar behind it. The logo of the whole IP.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Motion<\u002Fb> — speed streaks off both edges, a green wheel-trail, and drifting embers over the lower third.<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span><b style=\"color:#dde3e8\">Sheen sweep<\u002Fb> — one soft diagonal soft-light band raked across the wordmark.<\u002Fspan><\u002Fli><\u002Ful>\n<\u002Fdiv>\n  <div style=\"background:#14171b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px 24px 26px;display:flex;flex-direction:column;gap:16px;grid-column:1/-1\">\n  <div style=\"display:flex;flex-direction:column;gap:3px\">\n    <div style=\"font:600 11px/1 'Saira Condensed',sans-serif;letter-spacing:.28em;color:#2ae57e\">DIRECTION<\u002Fdiv>\n    <div style=\"font:600 21px/1.05 'Saira Condensed',sans-serif;color:#eef2f5;letter-spacing:.01em\">Mood, Do &amp; Don’t<\u002Fdiv>\n  <\u002Fdiv>\n  \n  <div style=\"display:flex;flex-wrap:wrap;gap:9px\"><span style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.12em;color:#cdd5db;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px\">NEAR-FUTURE<\u002Fspan><span style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.12em;color:#cdd5db;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px\">FLOODLIT RIG YARD<\u002Fspan><span style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.12em;color:#cdd5db;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px\">PROTOTYPE MACHINES<\u002Fspan><span style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.12em;color:#cdd5db;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px\">FROZEN COLLISION<\u002Fspan><span style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.12em;color:#cdd5db;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px\">CINEMATIC NIGHT<\u002Fspan><span style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.12em;color:#cdd5db;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px\">INDUSTRIAL CHROME<\u002Fspan><span style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.12em;color:#cdd5db;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px\">ONE GREEN THREAD<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px\">\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.2em;color:#2ae57e\">DO<\u002Fdiv>\n      <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px\"><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Motivated light with a single warm source<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Exactly one saturated accent (green)<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Freeze the peak of the action<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Leave negative space around the wordmark<\u002Fspan><\u002Fli><\u002Ful>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div style=\"font:600 12px 'Saira Condensed',sans-serif;letter-spacing:.2em;color:#ff6a6a\">DON'T<\u002Fdiv>\n      <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px\"><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Rainbow neon or multi-hue glows<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Flat, even, ambient lighting<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Purple/blue gradient-sky clichés<\u002Fspan><\u002Fli><li style=\"display:flex;gap:9px;font:400 13.5px/1.45 'Saira Condensed',sans-serif;color:#b3bcc3\"><span style=\"flex:none;width:5px;height:5px;margin-top:8px;border-radius:50%;background:#2ae57e\"><\u002Fspan><span>Emoji, or more than two hero machines<\u002Fspan><\u002Fli><\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;grain&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Preview&quot;},&quot;letterbox&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Preview&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      grain: this.props.grain ?? true,\n      letterbox: this.props.letterbox ?? false,\n    };\n  }\n}\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
