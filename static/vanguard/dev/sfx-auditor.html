function slotVolDefault(id){if(id in VOLEX)return VOLEX[id];const s=slotById(id);return s?(VOLGRP[s.g]||0):0;}
function slotVol(id){return (vols&&id in vols)?vols[id]:slotVolDefault(id);}
function fmtDb(v){return (v>0?'+':'')+v+' dB';}
function revBuf(b){const nb=actx.createBuffer(b.numberOfChannels,b.length,b.sampleRate);for(let ch=0;ch<b.numberOfChannels;ch++){const s=b.getChannelData(ch),d=nb.getChannelData(ch),n=s.length;for(let i=0;i<n;i++)d[i]=s[n-1-i];}return nb;}

function bestSlot(name){const s=name.toLowerCase();if(NOAUTO.some(r=>s.includes(r)))return null;let best=null,bs=0;for(const id in SLOTKW){let sc=0;for(const[t,w]of SLOTKW[id])if(s.includes(t))sc+=w;if(sc>bs){bs=sc;best=id;}}return bs>=THRESHOLD?{slot:best,score:bs}:null;}

// ---- persistence (decisions in localStorage; audio in IndexedDB) ----
function saveState(){try{const marks={};for(const c of LIB)if(c.slot){(marks[c.slot]=marks[c.slot]||[]).push({name:c.name,mark:c.mark,start:c.start,end:c.end,fx:c.fx});}localStorage.setItem(LSKEY,JSON.stringify({winner,marks,layers,notes,vols}));}catch(e){}}
function loadState(){try{const r=localStorage.getItem(LSKEY);if(!r)return;const d=JSON.parse(r);winner=d.winner||{};savedMarks=d.marks||{};layers=d.layers||{};notes=d.notes||{};vols=d.vols||{};}catch(e){}}
function applySaved(slotId,c){const a=savedMarks[slotId]||[];const m=a.find(x=>x.name===c.name);if(m){c.mark=m.mark;if(m.start!=null)c.start=m.start;if(m.end!=null)c.end=m.end;if(m.fx)c.fx=Object.assign({},FXDEF,m.fx);}}
function openIDB(){return new Promise(res=>{try{const r=indexedDB.open("vanguard_sfx_db",1);r.onupgradeneeded=e=>{e.target.result.createObjectStore("files",{keyPath:"key"});};r.onsuccess=e=>{idb=e.target.result;res();};r.onerror=()=>res();}catch(e){res();}});}
function idbPut(c){if(!idb||!cacheOn)return;try{idb.transaction("files","readwrite").objectStore("files").put({key:c.key,name:c.name,lib:c.lib,blob:c.blob,slot:c.slot});}catch(e){}}
function idbDel(key){if(!idb)return;try{idb.transaction("files","readwrite").objectStore("files").delete(key);}catch(e){}}
function idbClear(){if(!idb)return;try{idb.transaction("files","readwrite").objectStore("files").clear();}catch(e){}}
function idbAll(){return new Promise(res=>{if(!idb)return res([]);try{const rq=idb.transaction("files","readonly").objectStore("files").getAll();rq.onsuccess=()=>res(rq.result||[]);rq.onerror=()=>res([]);}catch(e){res([]);}});}

function pushUndo(){undoStack.push(snapshot());if(undoStack.length>40)undoStack.shift();}
function doUndo(){if(!undoStack.length){toast("nothing to undo");return;}const s=JSON.parse(undoStack.pop());winner=s.winner;layers=s.layers;notes=s.notes;const map={};s.m.forEach(x=>map[x.k]=x);for(const c of LIB){const x=map[c.key];if(x){c.slot=x.slot;c.mark=x.mark;c.start=x.start;c.end=x.end;c.fx=x.fx;}}saveState();render();toast("undid");}

// ---- audio ----
function ensureCtx(){if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=parseFloat(vol.value);master.connect(actx.destination);}if(actx.state==="suspended")actx.resume();}
function peakOf(b){let p=0;for(let ch=0;ch<b.numberOfChannels;ch++){const d=b.getChannelData(ch);for(let i=0;i<d.length;i+=64){const a=Math.abs(d[i]);if(a>p)p=a;}}return p||1;}
function buildWave(buf){const ch=buf.getChannelData(0),block=Math.max(1,Math.floor(ch.length/WAVEW)),pk=[];for(let i=0;i<WAVEW;i++){let mn=1,mx=-1;const s=i*block;for(let j=0;j<block;j++){const v=ch[s+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}pk.push([mn,mx]);}return pk;}
async function ensureBuf(c){if(c.buffer||c.err)return;ensureCtx();try{const ab=await c.blob.arrayBuffer();c.buffer=await actx.decodeAudioData(ab.slice(0));c.peak=peakOf(c.buffer);c.dur=c.buffer.duration;c.wave=buildWave(c.buffer);}catch(e){c.err=true;}}
function fxOf(c){return c.fxBypassActive?FXDEF:Object.assign({},FXDEF,c.fx||{});}
function makeCurve(amount){const k=amount*120,n=1024,curve=new Float32Array(n);for(let i=0;i<n;i++){const x=i*2/n-1;curve[i]=(1+k)*x/(1+k*Math.abs(x));}return curve;}
function effDur(c){const fx=c.fx||{};const rate=Math.pow(2,(fx.pitch||0)/12);const a=c.start||0,b=(c.end!=null?c.end:c.dur);return((b-a)/rate);}
function effDurMs(c){return c.dur?Math.round(effDur(c)*1000):0;}
function buildVoice(ctx,c,opt){
 const fx=(c.fx&&!c.fx.bypass)?Object.assign({},FXDEF,c.fx):FXDEF;
 const rate=Math.pow(2,(fx.pitch||0)/12);
 let buf=c.buffer,off=c.start||0;const endT=(c.end!=null?c.end:c.dur);const regionDur=endT-off,playDur=regionDur/rate;
 if(fx.reverse){if(!c._rev||c._rev.length!==c.buffer.length)c._rev=revBuf(c.buffer);buf=c._rev;off=c.dur-endT;}
 const src=ctx.createBufferSource();src.buffer=buf;src.playbackRate.value=rate;let node=src;
 if(fx.lowcut>20){const f=ctx.createBiquadFilter();f.type="highpass";f.frequency.value=fx.lowcut;node.connect(f);node=f;}
 if(fx.highcut>20&&fx.highcut<20000){const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=fx.highcut;node.connect(f);node=f;}
 if(fx.sub>0){const f=ctx.createBiquadFilter();f.type="lowshelf";f.frequency.value=90;f.gain.value=fx.sub;node.connect(f);node=f;}
 if(fx.drive>0){const w=ctx.createWaveShaper();w.curve=makeCurve(fx.drive);w.oversample="2x";node.connect(w);node=w;}
 if(fx.comp>0){const cp=ctx.createDynamicsCompressor();cp.threshold.value=-6-24*fx.comp;cp.ratio.value=4+8*fx.comp;cp.attack.value=0.003;cp.release.value=0.12;node.connect(cp);node=cp;}
 const sv=(levelMatch&&c.slot)?slotVol(c.slot):0;
 const g=ctx.createGain();const base=(levelMatch&&c.peak>0?Math.min(TARGET/c.peak,24):1)*Math.pow(10,((fx.gain||0)+sv)/20);
 const t0=opt.when||0,fi=Math.min((fx.fadeIn||0)/1000,playDur),fo=Math.min((fx.fadeOut||0)/1000,playDur);
 if(fi>0){g.gain.setValueAtTime(0.0001,t0);g.gain.linearRampToValueAtTime(base,t0+fi);}else g.gain.setValueAtTime(base,t0);
 if(fo>0&&!opt.loop){g.gain.setValueAtTime(base,Math.max(t0+fi,t0+playDur-fo));g.gain.linearRampToValueAtTime(0.0001,t0+playDur);}
 node.connect(g);g.connect(opt.dest);
 if(opt.loop){src.loop=true;src.loopStart=off;src.loopEnd=off+regionDur;src.start(t0,off);}else src.start(t0,off,regionDur);

}

async function play(c,opt){opt=opt||{};ensureCtx();const same=cur&&cur.uid===c.uid&&!opt.force&&!opt.loop;if(!opt._aud)stopAll(opt._aud);if(same)return;await ensureBuf(c);if(c.err){toast("decode error");return;}

function playJitter(c){ensureCtx();stopAll();const n=8;let t=actx.currentTime;const baseStep=effDur(c);const step=Math.min(0.12,Math.max(0.07,baseStep));
 for(let i=0;i<n;i++){const cc=Object.assign({},c,{fx:Object.assign({},FXDEF,c.fx,{pitch:((c.fx&&c.fx.pitch)||0)+(Math.random()*2-1)*1.3})});const v=buildVoice(actx,cc,{dest:master,when:t});voices.push(v);t+=step;}

async function intake(files){let sorted=0,uns=0;for(const f of [...files]){if(!/\.(wav|flac|aif|aiff|ogg|mp3)$/i.test(f.name))continue;const m=bestSlot(f.name);const folder=(f.webkitRelativePath||"").split("/").slice(-2,-1)[0]||"";const key=f.name+"|"+(f.size||0);if(LIB.some(c=>c.key===key))continue;const c={uid:++uidc,key,name:f.name,lib:folder,blob:f,buffer:null,peak:1,dur:0,mark:"none",slot:m?m.slot:null,score:m?m.score:0,start:null,end:null,fx:Object.assign({},FXDEF)};if(c.slot){applySaved(c.slot,c);sorted++;}else uns++;LIB.push(c);idbPut(c);}saveState();render();toast("Loaded "+(sorted+uns)+": "+sorted+" sorted, "+uns+" unsorted");}
const findUid=uid=>LIB.find(c=>c.uid===uid);
function setMark(uid,mk){pushUndo();const c=findUid(uid);if(!c)return;c.mark=(c.mark===mk)?"none":mk;if(c.mark==="cut"&&c.slot&&winner[c.slot]===c.name)delete winner[c.slot];saveState();render();}
function setWinner(uid){pushUndo();const c=findUid(uid);if(!c||!c.slot)return;winner[c.slot]=(winner[c.slot]===c.name)?undefined:c.name;if(winner[c.slot]===undefined)delete winner[c.slot];else if(c.mark==="cut")c.mark="keep";saveState();render();}
function toggleLayer(uid){pushUndo();const c=findUid(uid);if(!c||!c.slot)return;const arr=layers[c.slot]=layers[c.slot]||[];const i=arr.findIndex(L=>L.name===c.name);if(i>=0)arr.splice(i,1);else arr.push({name:c.name,offsetMs:arr.length*120,gainDb:0});if(!arr.length)delete layers[c.slot];saveState();render();}
function moveTo(uid,slotId){pushUndo();const c=findUid(uid);if(!c)return;if(c.slot&&winner[c.slot]===c.name)delete winner[c.slot];c.slot=slotId||null;c.mark="none";if(c.slot)c.score=c.score||1;idbPut(c);saveState();render();}
function removeCand(uid){pushUndo();const i=LIB.findIndex(c=>c.uid===uid);if(i<0)return;const c=LIB[i];if(c.slot&&winner[c.slot]===c.name)delete winner[c.slot];if(cur&&cur.uid===uid)stopAll();idbDel(c.key);LIB.splice(i,1);saveState();render();}

function tgtText(s){return s.dtype==="var"?`${s.rng[0]}-${s.rng[1]} ms, loops`:`${s.tgt} ms (\u00B1${s.tol})`;}
function durClass(c,s){if(!s)return"";if(s.dtype==="var")return"var";const ms=effDurMs(c);if(!ms)return"";const d=Math.abs(ms-s.tgt);if(d<=s.tol)return"ok";if(d<=s.tol*2)return"near";return"off";}

function drawEditor(playT){const cv=document.getElementById("wave");if(!cv||!edit)return;const c=findUid(edit.uid);if(!c||!c.wave)return;const ctx=cv.getContext("2d"),W=cv.width,H=cv.height,mid=H/2;
 const va=zoom?zoom.a:0,vb=zoom?zoom.b:c.dur,vspan=vb-va||c.dur;const tx=t=>((t-va)/vspan)*W;
 ctx.clearRect(0,0,W,H);ctx.fillStyle="#020A04";ctx.fillRect(0,0,W,H);
 const a=tx(c.start||0),b=tx(c.end!=null?c.end:c.dur);ctx.fillStyle="rgba(0,240,255,0.10)";ctx.fillRect(a,0,b-a,H);
 ctx.strokeStyle="#1d3a25";ctx.beginPath();ctx.moveTo(0,mid);ctx.lineTo(W,mid);ctx.stroke();
 ctx.strokeStyle="#00FF41";ctx.beginPath();const startSample=va/c.dur*c.wave.length,endSample=vb/c.dur*c.wave.length;for(let x=0;x<W;x++){const wi=Math.floor(startSample+(x/W)*(endSample-startSample));const p=c.wave[wi];if(!p)continue;ctx.moveTo(x,mid+p[0]*mid);ctx.lineTo(x,mid+p[1]*mid);}ctx.stroke();
 ctx.strokeStyle="#00F0FF";ctx.lineWidth=2;[a,b].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});ctx.lineWidth=1;
 if(playT!=null){const px=tx(playT);ctx.strokeStyle="#C8FF00";ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,H);ctx.stroke();}}
function setupEditor(){const cv=document.getElementById("wave");if(!cv||!edit)return;const c=findUid(edit.uid);if(!c||!c.dur)return;
 const va=()=>zoom?zoom.a:0,vb=()=>zoom?zoom.b:c.dur;
 const xToT=x=>{const r=cv.getBoundingClientRect();return Math.max(0,Math.min(c.dur,va()+(x/r.width)*(vb()-va())));};
 let drag=null;
 cv.onpointerdown=e=>{const r=cv.getBoundingClientRect(),px=e.clientX-r.left,W=r.width;const sp=vb()-va();const ax=((c.start||0)-va())/sp*W,bx=((c.end!=null?c.end:c.dur)-va())/sp*W;const t=xToT(px);if(Math.abs(px-ax)<8)drag="start";else if(Math.abs(px-bx)<8)drag="end";else{c.start=t;c.end=t;drag="end";}cv.setPointerCapture(e.pointerId);drawEditor();};
 cv.onpointermove=e=>{if(!drag)return;const r=cv.getBoundingClientRect();const t=xToT(e.clientX-r.left);if(drag==="start")c.start=t;else c.end=t;drawEditor();updateRead(c);};
 cv.onpointerup=()=>{if(!drag)return;drag=null;if(c.start!=null&&c.end!=null&&c.start>c.end){const t=c.start;c.start=c.end;c.end=t;}if((c.end-(c.start||0))<0.02)c.end=Math.min(c.dur,(c.start||0)+0.02);pushUndo();saveState();render();};
 drawEditor();}

   </div>

  </div>`;}
 h+=`<div class="plist">`;

function renderBrowser(){const folders=[...new Set(LIB.map(c=>c.lib).filter(Boolean))].sort();let pool=LIB.slice();

 const fx=e.target.closest("input[data-fx]");if(fx){pushUndo();saveState();return;}
 const lp=e.target.closest("input[data-lp]");if(lp){const lrow=e.target.closest(".lrow");const name=lrow.dataset.lname;const arr=layers[SLOTS[sel].id]||[];const L=arr.find(x=>x.name===name);if(L){L[lp.dataset.lp]=parseFloat(lp.value)||0;saveState();}return;}});

document.addEventListener("keydown",e=>{
 if(e.key==="Escape"){stopAll();return;}
 if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){doUndo();e.preventDefault();return;}
 if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
 if(mode!=="slots"){if(e.code==="Space")e.preventDefault();return;}
 const list=curList(),fc=edit&&findUid(edit.uid);
 if(e.key==="ArrowLeft"){sel=(sel-1+SLOTS.length)%SLOTS.length;edit=null;zoom=null;render();e.preventDefault();}
 else if(e.key==="ArrowRight"){sel=(sel+1)%SLOTS.length;edit=null;zoom=null;render();e.preventDefault();}
 else if(e.key==="ArrowDown"){const i=list.findIndex(c=>edit&&c.uid===edit.uid);const ni=Math.min(list.length-1,(i<0?0:i+1));if(list[ni]){edit={uid:list[ni].uid};zoom=null;render();}e.preventDefault();}
 else if(e.key==="ArrowUp"){const i=list.findIndex(c=>edit&&c.uid===edit.uid);const ni=Math.max(0,(i<0?0:i-1));if(list[ni]){edit={uid:list[ni].uid};zoom=null;render();}e.preventDefault();}
 else if(e.code==="Space"){if(fc)play(fc,{force:true});e.preventDefault();}
 else if(e.key.toLowerCase()==="f"){if(fc){const s2=fc.start,e2=fc.end;fc.start=null;fc.end=null;play(fc,{force:true});fc.start=s2;fc.end=e2;}}
 else if(e.key.toLowerCase()==="l"){if(fc)play(fc,{loop:true,force:true});}
 else if(e.key.toLowerCase()==="j"){if(fc)playJitter(fc);}
 else if(e.key.toLowerCase()==="c"){abToggle();}
 else if(e.key.toLowerCase()==="k"){if(fc)setMark(fc.uid,"keep");}
 else if(e.key.toLowerCase()==="x"){if(fc)setMark(fc.uid,"cut");}
 else if(e.key.toLowerCase()==="w"||e.key==="Enter"){if(fc)setWinner(fc.uid);}
 else if(e.key==="Delete"){if(fc)removeCand(fc.uid);}
 else if(e.key.toLowerCase()==="n"){jumpNextEmpty();}
});
function jumpNextEmpty(){const n=SLOTS.length;for(let k=1;k<=n;k++){const i=(sel+k)%n;const id=SLOTS[i].id;const hasWin=!!winner[id];const hasLy=!!(layers[id]&&layers[id].length);if(!hasWin&&!hasLy){sel=i;edit=null;zoom=null;if(mode!=="slots")setTab("slots");else render();toast("next empty: "+SLOTS[i].nm);return;}}toast("all slots filled");}

// ---- WAV + ZIP + render ----
function encodeWAV(buf){const nch=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length,bytes=44+len*nch*2,dv=new DataView(new ArrayBuffer(bytes));let p=0;const ws=s=>{for(let i=0;i<s.length;i++)dv.setUint8(p++,s.charCodeAt(i));};const u32=v=>{dv.setUint32(p,v,true);p+=4;},u16=v=>{dv.setUint16(p,v,true);p+=2;};
 ws("RIFF");u32(36+len*nch*2);ws("WAVE");ws("fmt ");u32(16);u16(1);u16(nch);u32(sr);u32(sr*nch*2);u16(nch*2);u16(16);ws("data");u32(len*nch*2);
 const chs=[];for(let c=0;c<nch;c++)chs.push(buf.getChannelData(c));for(let i=0;i<len;i++)for(let c=0;c<nch;c++){let v=Math.max(-1,Math.min(1,chs[c][i]));dv.setInt16(p,v<0?v*0x8000:v*0x7FFF,true);p+=2;}
 return new Uint8Array(dv.buffer);}
function crc32(u8){let c=~0;for(let i=0;i<u8.length;i++){c^=u8[i];for(let k=0;k<8;k++)c=(c>>>1)^(0xEDB88320&-(c&1));}return ~c>>>0;}
function zipStore(files){const chunks=[],cd=[];let offset=0;const enc=new TextEncoder();const le16=v=>[v&255,(v>>8)&255],le32=v=>[v&255,(v>>8)&255,(v>>16)&255,(v>>24)&255];
 for(const f of files){const nameB=enc.encode(f.name),crc=crc32(f.u8),sz=f.u8.length,start=offset;const local=new Uint8Array([].concat(le32(0x04034b50),le16(20),le16(0),le16(0),le16(0),le16(0),le32(crc),le32(sz),le32(sz),le16(nameB.length),le16(0)));chunks.push(local,nameB,f.u8);offset+=local.length+nameB.length+sz;cd.push({nameB,crc,sz,start});}
 const cdStart=offset,cdChunks=[];let cdLen=0;for(const e of cd){const c=new Uint8Array([].concat(le32(0x02014b50),le16(20),le16(20),le16(0),le16(0),le16(0),le16(0),le32(e.crc),le32(e.sz),le32(e.sz),le16(e.nameB.length),le16(0),le16(0),le16(0),le16(0),le32(0),le32(e.start)));cdChunks.push(c,e.nameB);cdLen+=c.length+e.nameB.length;}
 const end=new Uint8Array([].concat(le32(0x06054b50),le16(0),le16(0),le16(cd.length),le16(cd.length),le32(cdLen),le32(cdStart),le16(0)));
 return new Blob(chunks.concat(cdChunks,[end]),{type:"application/zip"});}
function dl(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();}
async function renderBuffer(c){await ensureBuf(c);if(c.err||!c.buffer)return null;const fx=(c.fx&&!c.fx.bypass)?Object.assign({},FXDEF,c.fx):FXDEF;const rate=Math.pow(2,(fx.pitch||0)/12);const off=c.start||0,regionDur=(c.end!=null?c.end:c.dur)-off,playDur=regionDur/rate;const sr=c.buffer.sampleRate;const oc=new OfflineAudioContext(c.buffer.numberOfChannels,Math.max(1,Math.ceil(playDur*sr)),sr);buildVoice(oc,c,{dest:oc.destination,when:0});return await oc.startRendering();}
async function renderLayers(slotId){const ls=layers[slotId]||[];const items=[];let sr=44100,nch=1,maxT=0;for(const L of ls){const c=LIB.find(x=>x.slot===slotId&&x.name===L.name);if(!c)continue;await ensureBuf(c);if(c.err)continue;sr=c.buffer.sampleRate;nch=Math.max(nch,c.buffer.numberOfChannels);const rate=Math.pow(2,((c.fx&&c.fx.pitch)||0)/12);const dur=((c.end!=null?c.end:c.dur)-(c.start||0))/rate;maxT=Math.max(maxT,(L.offsetMs||0)/1000+dur);items.push({c,L});}
 if(!items.length)return null;const oc=new OfflineAudioContext(nch,Math.ceil(maxT*sr),sr);for(const {c,L} of items){const cc=Object.assign({},c,{fx:Object.assign({},FXDEF,c.fx,{gain:((c.fx&&c.fx.gain)||0)+(L.gainDb||0)})});buildVoice(oc,cc,{dest:oc.destination,when:(L.offsetMs||0)/1000});}return await oc.startRendering();}
async function renderAll(){setBusy(5);const files=[];let n=0;for(const s of SLOTS){const fold=s.folder||"sfx";try{if(layers[s.id]&&layers[s.id].length){const b=await renderLayers(s.id);if(b)files.push({name:fold+"/"+s.id+"_1.wav",u8:encodeWAV(b)});}else{const list=LIB.filter(c=>c.slot===s.id);const w=list.find(c=>c.name===winner[s.id]);if(w){const b=await renderBuffer(w);if(b)files.push({name:fold+"/"+s.id+"_1.wav",u8:encodeWAV(b)});}const alt=list.find(c=>c.name!==winner[s.id]&&c.mark==="keep");if(alt){const b2=await renderBuffer(alt);if(b2)files.push({name:fold+"/"+s.id+"_2.wav",u8:encodeWAV(b2)});}}}catch(e){}n++;setBusy(5+90*n/SLOTS.length);}
 setBusy(100);if(!files.length){toast("No winners or layers to render");return;}dl(zipStore(files),"vanguard_sfx.zip");toast("Rendered "+files.length+" WAVs");}

const fileIn=document.getElementById("fileIn"),dirIn=document.getElementById("dirIn"),impIn=document.getElementById("impIn"),vol=document.getElementById("vol");
document.getElementById("folderBtn").onclick=()=>dirIn.click();document.getElementById("addBtn").onclick=()=>fileIn.click();
dirIn.onchange=()=>{intake(dirIn.files);dirIn.value="";};fileIn.onchange=()=>{intake(fileIn.files);fileIn.value="";};
function setTab(m){mode=m;document.getElementById("slotsTab").classList.toggle("active",m==="slots");document.getElementById("browseTab").classList.toggle("active",m==="browser");document.getElementById("covTab").classList.toggle("active",m==="coverage");render();}
document.getElementById("slotsTab").onclick=()=>setTab("slots");document.getElementById("browseTab").onclick=()=>setTab("browser");document.getElementById("covTab").onclick=()=>setTab("coverage");
document.getElementById("audBtn").onclick=()=>{if(auditioning){auditioning=false;updAudBtn();stopAll();}else startAudition();};
document.getElementById("stopBtn").onclick=()=>stopAll();document.getElementById("tpStop").onclick=()=>stopAll();
document.getElementById("lvlBtn").onclick=function(){levelMatch=!levelMatch;this.classList.toggle("active",levelMatch);this.textContent="Level: "+(levelMatch?"ON":"OFF");};
document.getElementById("cacheBtn").onclick=function(){cacheOn=!cacheOn;this.classList.toggle("active",cacheOn);this.textContent="Cache: "+(cacheOn?"ON":"OFF");if(cacheOn){for(const c of LIB)idbPut(c);toast("caching loaded files");}};
document.getElementById("undoBtn").onclick=doUndo;
vol.oninput=()=>{if(master)master.gain.value=parseFloat(vol.value);};
document.getElementById("clrBtn").onclick=()=>{if(!confirm("Clear everything (files, marks, winners, cache)?"))return;stopAll();LIB=[];winner={};savedMarks={};layers={};notes={};edit=null;undoStack=[];idbClear();saveState();render();};
document.getElementById("impBtn").onclick=()=>impIn.click();
impIn.onchange=()=>{const f=impIn.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);winner=d.winner||d.winners||{};if(d.layers)layers=d.layers;if(d.notes)notes=d.notes;if(d.vols)vols=d.vols;savedMarks={};if(d.detail){for(const id in d.detail){const dd=d.detail[id];savedMarks[id]=[...(dd.kept||[]).map(n=>({name:n,mark:"keep"})),...(dd.cut||[]).map(n=>({name:n,mark:"cut"}))];}}if(d.trims){for(const id in d.trims){const tr=d.trims[id],w=winner[id];if(w){savedMarks[id]=savedMarks[id]||[];let e2=savedMarks[id].find(x=>x.name===w);if(!e2){e2={name:w,mark:"keep"};savedMarks[id].push(e2);}e2.start=tr.start;e2.end=tr.end;}}}for(const c of LIB){if(c.slot){c.mark="none";c.start=null;c.end=null;c.fx=Object.assign({},FXDEF);applySaved(c.slot,c);}}saveState();render();toast("Imported");}catch(e){toast("Bad JSON");}};r.readAsText(f);impIn.value="";};
document.getElementById("expBtn").onclick=()=>{const out={generated:new Date().toISOString(),winners:{},targets:{},trims:{},fx:{},layers:{},notes,vols:{}};for(const s of SLOTS){out.winners[s.id]=winner[s.id]||null;out.targets[s.id]=s.dtype==="var"?{type:"var",range_ms:s.rng}:{type:"oneshot",target_ms:s.tgt,tol_ms:s.tol};const list=LIB.filter(c=>c.slot===s.id);const w=list.find(c=>winner[s.id]===c.name);if(w&&(w.start!=null||w.end!=null))out.trims[s.id]={start:+(w.start||0).toFixed(3),end:+((w.end!=null?w.end:w.dur)||0).toFixed(3)};if(w&&w.fx&&!w.fx.bypass)out.fx[s.id]=w.fx;if(layers[s.id]&&layers[s.id].length)out.layers[s.id]=layers[s.id];out.vols[s.id]=slotVol(s.id);}dl(new Blob([JSON.stringify(out,null,2)],{type:"application/json"}),"vanguard_sfx_picks.json");toast("Exported");};
document.getElementById("renderBtn").onclick=renderAll;

const drop=document.getElementById("drop");let dc=0;function setBusy(p){const b=document.getElementById("busy");b.style.width=(p<=0?0:Math.min(100,p))+"%";if(p>=100)setTimeout(()=>b.style.width=0,500);}
window.addEventListener("dragenter",e=>{e.preventDefault();dc++;drop.classList.add("show");});window.addEventListener("dragover",e=>e.preventDefault());window.addEventListener("dragleave",e=>{dc--;if(dc<=0){dc=0;drop.classList.remove("show");}});
window.addEventListener("drop",async e=>{e.preventDefault();dc=0;drop.classList.remove("show");const items=e.dataTransfer.items;if(items&&items.length&&items[0].webkitGetAsEntry){const files=[],ents=[];for(const it of items){const en=it.webkitGetAsEntry&&it.webkitGetAsEntry();if(en)ents.push(en);}async function walk(en){if(en.isFile){await new Promise(r=>en.file(f=>{files.push(f);r();},()=>r()));}else if(en.isDirectory){const rd=en.createReader();while(true){const b=await new Promise(r=>rd.readEntries(r,()=>r([])));if(!b.length)break;for(const x of b)await walk(x);}}}setBusy(10);for(const en of ents)await walk(en);setBusy(100);intake(files);}else if(e.dataTransfer.files.length)intake(e.dataTransfer.files);});
let toastT=null;function toast(m){let t=document.querySelector(".toast");if(!t){t=document.createElement("div");t.className="toast";document.body.appendChild(t);}t.textContent=m;clearTimeout(toastT);toastT=setTimeout(()=>t.remove(),2600);}

const MIGRATE={shoot:'fire_spread',rapid:'fire_rapid',beam_fire:'beam',enemy_hit:'hit',death_ace:'kill_ace',death_bmet:'kill_bmet',death_csee:'kill_csee',death_mat:'kill_mat',death_mset:'kill_mset',big_kill:'big',shield:'shield_hit',player_death:'death',boss_spawn:'boss_warn'};
const migId=id=>MIGRATE[id]||id;
function remapObj(o){const out={};for(const k in (o||{}))out[migId(k)]=o[k];return out;}
loadState();
try{ if(!localStorage.getItem('vanguard_sfx_mig_v9')){ winner=remapObj(winner); savedMarks=remapObj(savedMarks); layers=remapObj(layers); notes=remapObj(notes); localStorage.setItem('vanguard_sfx_mig_v9','1'); saveState(); } }catch(e){}
render();
openIDB().then(async()=>{const recs=await idbAll();if(!recs.length)return;for(const r of recs){if(LIB.some(c=>c.key===r.key))continue;const m=bestSlot(r.name);const c={uid:++uidc,key:r.key,name:r.name,lib:r.lib||"",blob:r.blob,buffer:null,peak:1,dur:0,mark:"none",slot:(SLOTS.some(function(s){return s.id===migId(r.slot);})?migId(r.slot):(m?m.slot:null)),score:m?m.score:1,start:null,end:null,fx:Object.assign({},FXDEF)};if(c.slot)applySaved(c.slot,c);LIB.push(c);}render();toast("Restored "+recs.length+" cached files");});
