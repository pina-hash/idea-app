<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 540" font-family="Roboto, Arial, sans-serif">
  <title>Third-angle orthographic views of a block with a through hole</title>
  <desc>A part shown as an isometric pictorial and three aligned views: top view shows the hole as a circle, front and right views show the hole as hidden dashed lines.</desc>
  <style>
    .part{fill:#e8eff8;stroke:#0066B3;stroke-width:2;}
    .iso{fill:#dbe6f4;stroke:#0066B3;stroke-width:1.6;}
    .hidden{stroke:#0066B3;stroke-width:1.4;stroke-dasharray:6 4;fill:none;}
    .ctr{stroke:#9A989A;stroke-width:1;stroke-dasharray:9 3 2 3;}
    .align{stroke:#c2ccd8;stroke-width:1;stroke-dasharray:4 4;}
    .vlabel{fill:#0066B3;font-size:12px;font-weight:700;letter-spacing:1px;}
    .note{fill:#5b6470;font-size:12px;}
    .cap{fill:#231F20;font-size:15px;font-weight:700;}
  </style>

  <!-- isometric pictorial -->
  <g>
    <polygon class="iso" points="470,330 560,330 588,310 498,310"/>
    <polygon class="iso" points="470,330 560,330 560,400 470,400"/>
    <polygon class="iso" points="560,330 588,310 588,380 560,400"/>
    <ellipse cx="529" cy="320" rx="15" ry="7.5" fill="#ffffff" stroke="#0066B3" stroke-width="1.4"/>
    <text class="note" x="529" y="430" text-anchor="middle" font-style="italic">the part</text>
  </g>

  <!-- alignment lines -->
  <line class="align" x1="120" y1="320" x2="120" y2="360"/>
  <line class="align" x1="260" y1="320" x2="260" y2="360"/>
  <line class="align" x1="168" y1="320" x2="168" y2="360"/>
  <line class="align" x1="212" y1="320" x2="212" y2="360"/>
  <line class="align" x1="260" y1="360" x2="300" y2="360"/>
  <line class="align" x1="260" y1="450" x2="300" y2="450"/>

  <!-- TOP view -->
  <rect class="part" x="120" y="230" width="140" height="90"/>
  <circle cx="190" cy="275" r="22" fill="#ffffff" stroke="#0066B3" stroke-width="2"/>
  <line class="ctr" x1="158" y1="275" x2="222" y2="275"/>
  <line class="ctr" x1="190" y1="245" x2="190" y2="305"/>
  <text class="vlabel" x="190" y="222" text-anchor="middle">TOP</text>

  <!-- FRONT view -->
  <rect class="part" x="120" y="360" width="140" height="90"/>
  <line class="hidden" x1="168" y1="360" x2="168" y2="450"/>
  <line class="hidden" x1="212" y1="360" x2="212" y2="450"/>
  <line class="ctr" x1="190" y1="352" x2="190" y2="458"/>
  <text class="vlabel" x="190" y="470" text-anchor="middle">FRONT</text>

  <!-- RIGHT view -->
  <rect class="part" x="300" y="360" width="90" height="90"/>
  <line class="hidden" x1="323" y1="360" x2="323" y2="450"/>
  <line class="hidden" x1="367" y1="360" x2="367" y2="450"/>
  <line class="ctr" x1="345" y1="352" x2="345" y2="458"/>
  <text class="vlabel" x="345" y="470" text-anchor="middle">RIGHT</text>

  <!-- caption / note -->
  <text class="cap" x="120" y="60">Third-angle projection</text>
  <text class="note" x="120" y="84">The top view sits above the front view, the right view beside it, and every feature lines up across views.</text>
  <text class="note" x="120" y="104">The same hole is a solid circle in the top view and a pair of hidden dashed lines in the front and right views.</text>

  <!-- legend -->
  <line class="hidden" x1="120" y1="500" x2="150" y2="500"/>
  <text class="note" x="156" y="504">hidden line</text>
  <line class="ctr" x1="250" y1="500" x2="280" y2="500"/>
  <text class="note" x="286" y="504">center line</text>
</svg>
