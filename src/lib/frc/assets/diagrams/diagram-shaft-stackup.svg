<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 350" font-family="Roboto, Arial, sans-serif">
  <title>A shaft stackup between two plates</title>
  <desc>Cross-section of a shaft supported by a bearing in each of two plates, with spacers positioning a centered gear and retaining rings holding the shaft from sliding.</desc>
  <defs>
    <pattern id="h2" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#b7c0cd" stroke-width="1.3"/>
    </pattern>
  </defs>
  <style>
    .plate{fill:url(#h2);stroke:#0066B3;stroke-width:2;}
    .shaft{fill:#cdd9ea;stroke:#0066B3;stroke-width:1.8;}
    .spacer{fill:#eef4fb;stroke:#0066B3;stroke-width:1.6;}
    .gear{fill:#dbe6f4;stroke:#0066B3;stroke-width:2;}
    .bear{fill:#b9ccec;stroke:#0066B3;stroke-width:1.8;}
    .ring{fill:#ED1C24;}
    .lbl{fill:#231F20;font-size:12px;}
    .lead{stroke:#9AA3AF;stroke-width:1;}
    .dim{stroke:#231F20;stroke-width:1;}
    .cap{fill:#5b6470;font-size:12px;font-style:italic;}
    .title{fill:#231F20;font-size:15px;font-weight:700;}
  </style>

  <text class="title" x="60" y="42">A shaft stackup</text>

  <!-- plates -->
  <rect class="plate" x="90"  y="96" width="22" height="180"/>
  <rect class="plate" x="468" y="96" width="22" height="180"/>
  <!-- shaft full length -->
  <rect class="shaft" x="56" y="176" width="470" height="20"/>
  <!-- spacers -->
  <rect class="spacer" x="114" y="170" width="152" height="32"/>
  <rect class="spacer" x="324" y="170" width="142" height="32"/>
  <!-- gear (centered) with tooth hints -->
  <rect class="gear" x="268" y="140" width="54" height="92"/>
  <g fill="#dbe6f4" stroke="#0066B3" stroke-width="1.2">
    <rect x="272" y="132" width="8" height="8"/><rect x="286" y="132" width="8" height="8"/><rect x="300" y="132" width="8" height="8"/><rect x="310" y="132" width="8" height="8"/>
    <rect x="272" y="232" width="8" height="8"/><rect x="286" y="232" width="8" height="8"/><rect x="300" y="232" width="8" height="8"/><rect x="310" y="232" width="8" height="8"/>
  </g>
  <!-- bearings at each plate -->
  <rect class="bear" x="87"  y="158" width="28" height="56"/>
  <rect class="bear" x="465" y="158" width="28" height="56"/>
  <!-- retaining rings -->
  <rect class="ring" x="64"  y="164" width="6" height="44"/>
  <rect class="ring" x="512" y="164" width="6" height="44"/>

  <!-- plate-separation dimension -->
  <line class="dim" x1="112" y1="118" x2="468" y2="118"/>
  <line class="dim" x1="112" y1="112" x2="112" y2="124"/>
  <line class="dim" x1="468" y1="112" x2="468" y2="124"/>
  <rect x="262" y="108" width="56" height="18" fill="#f2f5f9"/>
  <text class="lbl" x="290" y="122" text-anchor="middle" font-weight="600">2.500 in</text>

  <!-- labels with light leaders -->
  <line class="lead" x1="101" y1="276" x2="101" y2="292"/>
  <text class="lbl" x="101" y="306" text-anchor="middle">plate</text>
  <line class="lead" x1="479" y1="276" x2="479" y2="292"/>
  <text class="lbl" x="479" y="306" text-anchor="middle">plate</text>

  <line class="lead" x1="101" y1="214" x2="101" y2="238"/>
  <text class="lbl" x="101" y="252" text-anchor="middle">bearing</text>
  <line class="lead" x1="479" y1="214" x2="479" y2="238"/>
  <text class="lbl" x="479" y="252" text-anchor="middle">bearing</text>

  <line class="lead" x1="190" y1="202" x2="190" y2="238"/>
  <text class="lbl" x="190" y="252" text-anchor="middle">spacer</text>
  <line class="lead" x1="395" y1="202" x2="395" y2="238"/>
  <text class="lbl" x="395" y="252" text-anchor="middle">spacer</text>

  <text class="lbl" x="295" y="132" text-anchor="middle" font-weight="600">gear (centered)</text>

  <line class="lead" x1="67" y1="164" x2="67" y2="150"/>
  <text class="lbl" x="60" y="144" fill="#ED1C24" font-weight="700">retaining ring</text>
  <line class="lead" x1="515" y1="164" x2="515" y2="150"/>
  <text class="lbl" x="560" y="144" fill="#ED1C24" font-weight="700" text-anchor="end">retaining ring</text>

  <text class="lbl" x="540" y="190">shaft</text>

  <text class="cap" x="60" y="336">Everything is located, free to spin, and held from sliding. Round where the bearings ride, hex through the gear.</text>
</svg>
