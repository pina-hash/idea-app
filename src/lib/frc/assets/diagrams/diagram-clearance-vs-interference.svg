<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="Roboto, Arial, sans-serif">
  <title>Clearance fit versus interference fit</title>
  <desc>Left: a clearance fit where the shaft is smaller than the bore, leaving a gap so it slides or spins, like a shaft in a bearing. Right: an interference or press fit where the part is slightly larger than the bore and is pressed in, like a bearing in a plate.</desc>
  <defs>
    <pattern id="h3" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#b7c0cd" stroke-width="1.3"/>
    </pattern>
    <marker id="rd" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ED1C24"/></marker>
    <marker id="bd" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0066B3"/></marker>
  </defs>
  <style>
    .part{fill:url(#h3);stroke:#0066B3;stroke-width:2;}
    .metal{fill:#cdd9ea;stroke:#0066B3;stroke-width:2;}
    .title{fill:#231F20;font-size:15px;font-weight:700;}
    .note{fill:#5b6470;font-size:12px;}
    .red{fill:#ED1C24;font-size:11.5px;font-weight:700;}
  </style>

  <!-- ===== PANEL A: CLEARANCE ===== -->
  <text class="title" x="60" y="42">Clearance fit</text>
  <text class="note" x="60" y="64">Hole larger than the shaft. It slides or spins.</text>

  <rect class="part" x="60" y="120" width="200" height="30"/>
  <rect class="part" x="60" y="210" width="200" height="30"/>
  <rect class="metal" x="60" y="166" width="222" height="28"/>

  <!-- gap callouts -->
  <line stroke="#ED1C24" stroke-width="1.6" x1="150" y1="132" x2="150" y2="149" marker-end="url(#rd)"/>
  <line stroke="#ED1C24" stroke-width="1.6" x1="150" y1="228" x2="150" y2="211" marker-end="url(#rd)"/>
  <text class="red" x="160" y="300" text-anchor="middle">clearance gap</text>
  <text class="note" x="160" y="318" text-anchor="middle">example: a shaft in a bearing</text>
  <text class="note" x="290" y="184" text-anchor="end" font-style="italic">shaft</text>

  <!-- ===== PANEL B: INTERFERENCE ===== -->
  <text class="title" x="380" y="42">Interference / press fit</text>
  <text class="note" x="380" y="64">Part slightly larger. Pressed in, it stays put.</text>

  <rect class="part" x="380" y="120" width="200" height="30"/>
  <rect class="part" x="380" y="210" width="200" height="30"/>
  <!-- insert fully fills the bore, no gap -->
  <rect class="metal" x="380" y="150" width="200" height="60"/>

  <!-- press-in arrows -->
  <line stroke="#0066B3" stroke-width="1.8" x1="450" y1="96" x2="450" y2="147" marker-end="url(#bd)"/>
  <line stroke="#0066B3" stroke-width="1.8" x1="510" y1="96" x2="510" y2="147" marker-end="url(#bd)"/>
  <text class="note" x="480" y="90" text-anchor="middle">press in</text>

  <!-- interference callout -->
  <line stroke="#ED1C24" stroke-width="1.6" x1="600" y1="180" x2="582" y2="180" marker-end="url(#rd)"/>
  <text class="red" x="480" y="300" text-anchor="middle">no gap · interference</text>
  <text class="note" x="480" y="318" text-anchor="middle">example: a bearing in a plate</text>

  <!-- divider + disclaimer -->
  <line x1="320" y1="30" x2="320" y2="326" stroke="#dbe1e8" stroke-width="1.5"/>
  <text class="note" x="60" y="340" font-style="italic" font-size="11px">Gap exaggerated for clarity.</text>
</svg>
