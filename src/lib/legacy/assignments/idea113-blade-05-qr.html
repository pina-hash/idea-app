<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEA-Blade A05 - QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #fff;
  color: #111;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
}
.card {
  text-align: center;
  max-width: 480px;
  width: 100%;
}
.label {
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 0.04em;
  margin-bottom: 24px;
  color: #111;
  line-height: 1.3;
}
#qrcode {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
#qrcode canvas, #qrcode img {
  border: 6px solid #111;
}
.url {
  font-size: 13px;
  color: #333;
  letter-spacing: 0.02em;
  word-break: break-all;
  border-top: 1px solid #ccc;
  padding-top: 14px;
  margin-top: 4px;
}
@media print {
  body { min-height: unset; padding: 0.5in; }
  @page { size: letter; margin: 0.5in; }
}
</style>
</head>
<body>
<div class="card">
  <div class="label">IDEA-Blade A05 &mdash; Scan to log match results</div>
  <div id="qrcode"></div>
  <div class="url">https://mrpina-dev.github.io/IDEA/idea113-blade-05.html</div>
</div>
<script>
new QRCode(document.getElementById('qrcode'), {
  text: 'https://mrpina-dev.github.io/IDEA/idea113-blade-05.html',
  width: 320,
  height: 320,
  colorDark: '#111111',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
